name: keep-warm
# Render free tier sleeps after 15 min idle (cold start returns a 404 until it
# spins back up). Ping /health every ~10 min so the first real visitor never
# hits a cold instance. Scheduled runs can be delayed by GitHub a few minutes.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            code=$(curl -s -m 60 -o /dev/null -w "%{http_code}" https://gta-paris.onrender.com/health || true)
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 30
          done
          echo "health check did not return 200"
