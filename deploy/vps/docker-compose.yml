# Single-VM deploy for any Ubuntu VPS (Scaleway / OVH / Hetzner / Oracle...).
# Caddy terminates TLS (auto Let's Encrypt) and reverse-proxies to the game
# server (Express + Colyseus WebSocket + geckos.io WebRTC). Always-on.
#
#   DOMAIN=play.example.com docker compose -f deploy/vps/docker-compose.yml up -d --build
#
# Both services use host networking so the WebRTC datachannel's UDP ports land on
# the box's public IP (required for ICE to connect). Open in the firewall/Security
# Group: TCP 80, 443 and UDP 20000-20100. (Linux hosts only — fine for any VPS.)
services:
  app:
    # CI builds + pushes this image (GitHub Actions); the box just pulls it.
    # `build` is kept for manual/local builds (docker compose up -d --build).
    image: ghcr.io/warrenseine/gta-paris:latest
    build:
      context: ../.. # repo root (reuses the same Dockerfile as Render)
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=2567
      - GECKOS_UDP_MIN=20000
      - GECKOS_UDP_MAX=20100
    restart: always

  caddy:
    image: caddy:2
    network_mode: host
    depends_on:
      - app
    environment:
      - DOMAIN=${DOMAIN:?set DOMAIN to your hostname, e.g. play.example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: always

volumes:
  caddy_data:
  caddy_config:
